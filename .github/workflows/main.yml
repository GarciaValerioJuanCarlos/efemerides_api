name: CI/CD Backend a Cloud Run (Híbrido)

on:
  push:
    branches: [ "main" ] # Se dispara al hacer merge a main

env:
  PROJECT_ID: tu-id-de-proyecto-gcp
  REGION: us-central1
  SERVICE_NAME: mi-servicio-backend
  GAR_LOCATION: us-central1 # Ubicación de Artifact Registry
  REPOSITORY: mi-repo-docker # Nombre del repositorio en Artifact Registry
  IMAGE_NAME: mi-app-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Permisos necesarios para Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Autenticación con Google Cloud vía WIF
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      # 2. Login en Artifact Registry (Docker Login)
      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      # 3. Build y Push de la imagen
      - name: Build and Push Container
        run: |-
          DOCKER_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      # 4. Despliegue en Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'

      # 5. Output de la URL generada
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
